<!DOCTYPE html>
<html>
<head>
<title>Coffee Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5ebe0;
            text-align: center;
            margin: 40px;
            color: #4e342e;
        }
        h1 {color: #6f4e37;margin-bottom: 20px;}

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: #fffaf5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(111, 78, 55, 0.15);
        }

        th {
            background-color: #6f4e37;
            color: white;
            padding: 15px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #d7ccc8;
        }

        tr:nth-child(even) {
            background-color: #efebe9;
        }

        tr:hover {
            background-color: #d7ccc8;
        }

        caption {
            font-size: 18px;
            font-weight: bold;
            color: #8d6e63;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>Coffee Menu</h1>
    <table>
        <caption>Brews for Every Mood</caption>
        <tr>
            <th>Coffee</th>
            <th>Description</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Espresso</td>
            <td>Strong and rich coffee shot</td>
            <td>₹120</td>
        </tr>
        <tr>
            <td>Cappuccino</td>
            <td>Espresso with steamed milk foam</td>
            <td>₹180</td>
        </tr>
        <tr>
            <td>Latte</td>
            <td>Smooth coffee with creamy milk</td>
            <td>₹200</td>
        </tr>
        <tr>
            <td>Mocha</td>
            <td>Coffee blended with chocolate</td>
            <td>₹220</td>
        </tr>
        <tr>
            <td>Cold Brew</td>
            <td>Slow-steeped refreshing coffee</td>
            <td>₹250</td>
        </tr>
    </table>
</body>
</html>
